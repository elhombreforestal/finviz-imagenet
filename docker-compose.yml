services:
  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      CI: "true"
      SQLITE_PATH: /data/app.db
      XML_PATH: /app/data/structure_released.xml
    volumes:
      - ./web:/app
      - node_modules:/app/node_modules
      - db-data:/data
    command: sh -lc "pnpm install && pnpm run dev"

volumes:
  db-data:
  node_modules:
  
