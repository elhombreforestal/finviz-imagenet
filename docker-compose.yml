services:
  web-dev:
    profiles: ["dev"]
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      CI: "true"
      SQLITE_PATH: /data/app.db
      XML_PATH: /app/data/structure_released.xml
    volumes:
      - ./web:/app
      - node_modules:/app/node_modules
      - db-data:/data
    command: sh -lc "pnpm install && pnpm run seed && pnpm run dev"
  web:
    profiles: ["prod"]
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      SQLITE_PATH: /data/app.db
      XML_PATH: /app/data/structure_released.xml
    volumes:
      - db-data:/data
    restart: unless-stopped

volumes:
  db-data:
  node_modules:
  
